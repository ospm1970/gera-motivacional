<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Avaliar Frase Motivacional</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; }
    label { font-weight: bold; display: block; margin-bottom: 0.5rem; }
    input[type=number] { width: 60px; padding: 0.3rem; font-size: 1rem; }
    button { margin-top: 1rem; padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; }
    .error { color: red; margin-top: 0.5rem; }
    .success { color: green; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <h1>Avalie a frase motivacional</h1>
  <form id="rating-form">
    <label for="rating">Nota (0 a 5):</label>
    <input type="number" id="rating" name="rating" min="0" max="5" step="1" required />
    <input type="hidden" id="phraseId" name="phraseId" value="" />
    <button type="submit">Enviar Avaliação</button>
    <div id="feedback" role="alert" aria-live="polite"></div>
  </form>

  <script>
    (function() {
      // Simulação: phraseId deve ser definido dinamicamente conforme frase exibida
      const phraseId = '00000000-0000-0000-0000-000000000000'; // substituir pelo id real
      document.getElementById('phraseId').value = phraseId;

      const form = document.getElementById('rating-form');
      const ratingInput = document.getElementById('rating');
      const feedback = document.getElementById('feedback');

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        feedback.textContent = '';
        feedback.className = '';

        const ratingValue = ratingInput.value.trim();
        const ratingNumber = Number(ratingValue);

        if (!Number.isInteger(ratingNumber) || ratingNumber < 0 || ratingNumber > 5) {
          feedback.textContent = 'Por favor, insira um número inteiro entre 0 e 5.';
          feedback.className = 'error';
          ratingInput.focus();
          return;
        }

        try {
          const response = await fetch('/api/phrases/rating', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phraseId, rating: ratingNumber })
          });

          if (response.ok) {
            feedback.textContent = 'Avaliação enviada com sucesso!';
            feedback.className = 'success';
            ratingInput.value = '';
          } else {
            const data = await response.json();
            feedback.textContent = data.error || 'Erro ao enviar avaliação.';
            feedback.className = 'error';
          }
        } catch (error) {
          feedback.textContent = 'Erro de rede ao enviar avaliação.';
          feedback.className = 'error';
        }
      });
    })();
  </script>
</body>
</html>
