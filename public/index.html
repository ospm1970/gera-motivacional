<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de Frases Motivacionais</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-in {
      animation: fadeIn 0.3s ease-in-out;
    }

    .gradient-bg {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .card-shadow {
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>
<body class="bg-gray-50">
  <div class="min-h-screen gradient-bg flex items-center justify-center p-4">
    <div class="w-full max-w-md">
      <!-- Header -->
      <div class="text-center mb-8">
        <h1 class="text-4xl font-bold text-white mb-2">✨ Motivação</h1>
        <p class="text-purple-100 text-lg">Crie frases motivacionais personalizadas</p>
      </div>

      <!-- Card Principal -->
      <div class="bg-white rounded-lg card-shadow p-8">
        <!-- Formulário -->
        <form id="motivationalForm" class="space-y-6">
          <div class="space-y-4">
            <label class="block">
              <span class="text-gray-700 font-semibold mb-2 block">Palavra 1</span>
              <input
                type="text"
                id="word1"
                placeholder="Digite a primeira palavra"
                class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-purple-500 transition"
                required
              />
            </label>

            <label class="block">
              <span class="text-gray-700 font-semibold mb-2 block">Palavra 2</span>
              <input
                type="text"
                id="word2"
                placeholder="Digite a segunda palavra"
                class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-purple-500 transition"
                required
              />
            </label>

            <label class="block">
              <span class="text-gray-700 font-semibold mb-2 block">Palavra 3</span>
              <input
                type="text"
                id="word3"
                placeholder="Digite a terceira palavra"
                class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-purple-500 transition"
                required
              />
            </label>
          </div>

          <!-- Mensagens de Erro -->
          <div id="errorMessage" class="hidden p-4 bg-red-100 border-l-4 border-red-500 text-red-700 rounded">
            <p id="errorText"></p>
          </div>

          <!-- Botões -->
          <div class="flex gap-3">
            <button
              type="submit"
              id="submitBtn"
              class="flex-1 bg-gradient-to-r from-purple-600 to-purple-700 text-white font-bold py-3 px-4 rounded-lg hover:shadow-lg transition disabled:opacity-50 disabled:cursor-not-allowed"
            >
              <span id="submitText">Gerar Frase</span>
              <span id="spinner" class="hidden">⏳ Gerando...</span>
            </button>

            <button
              type="reset"
              id="resetBtn"
              class="flex-1 bg-gray-200 text-gray-700 font-bold py-3 px-4 rounded-lg hover:bg-gray-300 transition disabled:opacity-50 disabled:cursor-not-allowed"
            >
              Limpar
            </button>
          </div>
        </form>

        <!-- Resultado -->
        <div id="resultContainer" class="hidden mt-8 pt-8 border-t-2 border-gray-200">
          <div class="mb-4">
            <h3 class="text-gray-600 font-semibold text-sm mb-2">PALAVRAS UTILIZADAS:</h3>
            <div id="wordsDisplay" class="flex flex-wrap gap-2"></div>
          </div>

          <div class="bg-gradient-to-r from-purple-50 to-purple-100 rounded-lg p-6 border-2 border-purple-200">
            <h2 class="text-gray-700 font-semibold text-sm mb-3">SUA FRASE MOTIVACIONAL:</h2>
            <p id="phraseDisplay" class="text-2xl font-bold text-purple-900 leading-relaxed"></p>
          </div>

          <div class="mt-4 text-center">
            <p id="timestamp" class="text-gray-500 text-sm"></p>
          </div>
        </div>

        <!-- Loading State -->
        <div id="loadingContainer" class="hidden mt-8 text-center">
          <div class="inline-block">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-purple-600"></div>
          </div>
          <p class="text-gray-600 mt-4">Gerando sua frase motivacional...</p>
        </div>
      </div>

      <!-- Footer -->
      <div class="text-center mt-8 text-purple-100 text-sm">
        <p>Powered by OpenAI ChatGPT</p>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('motivationalForm');
    const word1Input = document.getElementById('word1');
    const word2Input = document.getElementById('word2');
    const word3Input = document.getElementById('word3');
    const submitBtn = document.getElementById('submitBtn');
    const resetBtn = document.getElementById('resetBtn');
    const errorMessage = document.getElementById('errorMessage');
    const errorText = document.getElementById('errorText');
    const resultContainer = document.getElementById('resultContainer');
    const loadingContainer = document.getElementById('loadingContainer');
    const phraseDisplay = document.getElementById('phraseDisplay');
    const wordsDisplay = document.getElementById('wordsDisplay');
    const timestamp = document.getElementById('timestamp');
    const submitText = document.getElementById('submitText');
    const spinner = document.getElementById('spinner');

    // Validar entrada
    function validateInput(word) {
      if (!word || word.trim().length === 0) {
        return false;
      }
      const portugueseWordRegex = /^[a-záàâãéèêíïóôõöúçñ\s-]+$/i;
      return portugueseWordRegex.test(word.trim());
    }

    // Mostrar erro
    function showError(message) {
      errorText.textContent = message;
      errorMessage.classList.remove('hidden');
      resultContainer.classList.add('hidden');
      loadingContainer.classList.add('hidden');
    }

    // Limpar erro
    function clearError() {
      errorMessage.classList.add('hidden');
      errorText.textContent = '';
    }

    // Submeter formulário
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();

      const word1 = word1Input.value.trim();
      const word2 = word2Input.value.trim();
      const word3 = word3Input.value.trim();

      // Validar palavras
      if (!validateInput(word1)) {
        showError('Palavra 1 é inválida. Use apenas letras portuguesas.');
        return;
      }
      if (!validateInput(word2)) {
        showError('Palavra 2 é inválida. Use apenas letras portuguesas.');
        return;
      }
      if (!validateInput(word3)) {
        showError('Palavra 3 é inválida. Use apenas letras portuguesas.');
        return;
      }

      // Mostrar loading
      resultContainer.classList.add('hidden');
      loadingContainer.classList.remove('hidden');
      submitBtn.disabled = true;
      resetBtn.disabled = true;
      submitText.classList.add('hidden');
      spinner.classList.remove('hidden');

      try {
        const response = await fetch('/api/motivational-phrase', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            words: [word1, word2, word3],
          }),
        });

        const data = await response.json();

        if (!response.ok) {
          showError(data.error || 'Erro ao gerar frase motivacional');
          loadingContainer.classList.add('hidden');
          return;
        }

        // Exibir resultado
        phraseDisplay.textContent = data.phrase;
        
        wordsDisplay.innerHTML = data.words
          .map(
            word =>
              `<span class="bg-purple-200 text-purple-800 px-3 py-1 rounded-full text-sm font-semibold">${word}</span>`
          )
          .join('');

        const date = new Date(data.timestamp);
        timestamp.textContent = `Gerado em ${date.toLocaleString('pt-BR')}`;

        resultContainer.classList.remove('hidden');
        loadingContainer.classList.add('hidden');
      } catch (error) {
        console.error('Erro:', error);
        showError('Erro de conexão. Verifique sua internet e tente novamente.');
        loadingContainer.classList.add('hidden');
      } finally {
        submitBtn.disabled = false;
        resetBtn.disabled = false;
        submitText.classList.remove('hidden');
        spinner.classList.add('hidden');
      }
    });

    // Limpar formulário
    resetBtn.addEventListener('click', () => {
      form.reset();
      resultContainer.classList.add('hidden');
      loadingContainer.classList.add('hidden');
      clearError();
      word1Input.focus();
    });

    // Focus inicial
    word1Input.focus();
  </script>
</body>
</html>
