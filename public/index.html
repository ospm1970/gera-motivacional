<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de Frases Motivacionais</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="bg-gray-50">
  <div class="min-h-screen gradient-bg flex items-center justify-center p-4">
    <div class="w-full max-w-2xl">
      <!-- Header -->
      <div class="text-center mb-8">
        <h1 class="text-4xl font-bold text-white mb-2">✨ Motivação</h1>
        <p class="text-purple-100 text-lg">Crie frases motivacionais personalizadas</p>
      </div>

      <!-- Card Principal -->
      <div class="bg-white rounded-lg card-shadow p-8">

        <!-- Média das Avaliações -->
        <section id="average-rating-section" aria-live="polite"
          class="mb-6 p-4 bg-purple-50 border border-purple-200 rounded-lg text-center">
          <h2 class="text-gray-600 font-semibold text-sm mb-1">⭐ MÉDIA DAS AVALIAÇÕES</h2>
          <p id="average-rating" class="text-2xl font-bold text-purple-700">—</p>
        </section>

        <!-- Formulário -->
        <form id="motivationalForm" class="space-y-6">
          <div class="space-y-4">
            <label class="block">
              <span class="text-gray-700 font-semibold mb-2 block">Palavra 1</span>
              <input type="text" id="word1" placeholder="Digite a primeira palavra"
                class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-purple-500 transition" required />
            </label>
            <label class="block">
              <span class="text-gray-700 font-semibold mb-2 block">Palavra 2</span>
              <input type="text" id="word2" placeholder="Digite a segunda palavra"
                class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-purple-500 transition" required />
            </label>
            <label class="block">
              <span class="text-gray-700 font-semibold mb-2 block">Palavra 3</span>
              <input type="text" id="word3" placeholder="Digite a terceira palavra"
                class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-purple-500 transition" required />
            </label>
          </div>

          <div id="errorMessage" class="hidden p-4 bg-red-100 border-l-4 border-red-500 text-red-700 rounded">
            <p id="errorText"></p>
          </div>

          <div class="flex gap-3">
            <button type="submit" id="submitBtn"
              class="flex-1 bg-gradient-to-r from-purple-600 to-purple-700 text-white font-bold py-3 px-4 rounded-lg hover:shadow-lg transition disabled:opacity-50 disabled:cursor-not-allowed">
              <span id="submitText">Gerar Frase</span>
              <span id="spinner" class="hidden">⏳ Gerando...</span>
            </button>
            <button type="reset" id="resetBtn"
              class="flex-1 bg-gray-200 text-gray-700 font-bold py-3 px-4 rounded-lg hover:bg-gray-300 transition disabled:opacity-50 disabled:cursor-not-allowed">
              Limpar
            </button>
          </div>
        </form>

        <!-- Loading -->
        <div id="loadingContainer" class="hidden mt-8 text-center">
          <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-purple-600"></div>
          <p class="text-gray-600 mt-4">Gerando suas frases...</p>
        </div>

        <!-- Resultado -->
        <div id="resultContainer" class="hidden mt-8 pt-8 border-t-2 border-gray-200">
          <div class="mb-4">
            <h3 class="text-gray-600 font-semibold text-sm mb-2">PALAVRAS UTILIZADAS:</h3>
            <div id="wordsDisplay" class="flex flex-wrap gap-2"></div>
          </div>

          <div class="flex gap-4 flex-wrap">
            <!-- Frase Motivacional -->
            <div class="flex-1 min-w-xs bg-gradient-to-r from-green-50 to-green-100 rounded-lg p-6 border-2 border-green-300">
              <h2 class="text-gray-700 font-semibold text-sm mb-3">🌟 FRASE MOTIVACIONAL:</h2>
              <p id="phraseDisplay" class="text-lg font-bold text-green-900 leading-relaxed mb-4"></p>
              <div class="rating-section">
                <p class="text-gray-600 text-sm font-semibold mb-2">Avalie esta frase:</p>
                <div class="stars-container" id="starsMotivational"></div>
                <p id="ratingMsgMotivational" class="text-sm mt-1 h-4"></p>
              </div>
            </div>

            <!-- Frase Satírica -->
            <div class="flex-1 min-w-xs bg-gradient-to-r from-red-50 to-red-100 rounded-lg p-6 border-2 border-red-300">
              <h2 class="text-gray-700 font-semibold text-sm mb-3">😏 FRASE SATÍRICA:</h2>
              <p id="satiricalDisplay" class="text-lg font-bold text-red-900 leading-relaxed mb-4"></p>
              <div class="rating-section">
                <p class="text-gray-600 text-sm font-semibold mb-2">Avalie esta frase:</p>
                <div class="stars-container" id="starsSatirical"></div>
                <p id="ratingMsgSatirical" class="text-sm mt-1 h-4"></p>
              </div>
            </div>
          </div>

          <div class="mt-4 text-center">
            <p id="timestamp" class="text-gray-500 text-sm"></p>
          </div>
        </div>
      </div>

      <div class="text-center mt-8 text-purple-100 text-sm">
        <p>Powered by OpenAI ChatGPT</p>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
